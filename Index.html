<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob Esponja — Fenda do Biquíni</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background:
        radial-gradient(120% 60% at 50% -10%, rgba(180,240,255,.35), transparent 60%),
        linear-gradient(180deg,
          #021a33 0%, #073e6b 22%, #0d68a3 44%,
          #1f93c4 64%, #45bcd9 78%, #74d4e6 88%);
      position: relative;
    }

    /* ════════ Raios de luz ════════ */
    .ray {
      position: fixed; top: -12vh; width: 13vw; height: 74vh;
      background: linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,0));
      transform-origin: top center;
      animation: raysway 9s ease-in-out infinite alternate;
      pointer-events: none; filter: blur(7px); z-index: 1;
    }
    .ray.r1 { left: 10%; transform: rotate(14deg); }
    .ray.r2 { left: 36%; transform: rotate(-6deg); animation-delay: 2.5s; width: 19vw; }
    .ray.r3 { left: 66%; transform: rotate(10deg); animation-delay: 1.2s; }
    .ray.r4 { left: 86%; transform: rotate(-12deg); animation-delay: 3.4s; width: 9vw; }
    @keyframes raysway {
      from { opacity: .38; transform: rotate(8deg); }
      to   { opacity: .12; transform: rotate(-8deg); }
    }

    /* ════════ Partículas em suspensão ════════ */
    .dust { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    .dust i {
      position: absolute; display: block; width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,.45);
      animation: dustfloat var(--dd, 14s) linear infinite;
      left: var(--dx); top: 110%;
      animation-delay: var(--dl);
      filter: blur(.5px);
    }
    @keyframes dustfloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      8% { opacity: .7; }
      100% { transform: translateY(-118vh) translateX(36px); opacity: 0; }
    }

    /* ════════ Nuvens-flor (o céu do desenho!) ════════ */
    .flower { position: fixed; pointer-events: none; z-index: 2; animation: drift linear infinite; opacity: .92; filter: drop-shadow(0 4px 6px rgba(0,30,60,.25)); }
    .flower .c { position: absolute; border-radius: 50%; width: 46px; height: 46px; background: var(--fc, #6fd3e3); }
    .flower .c:nth-child(1) { left: 22px; top: -16px; }
    .flower .c:nth-child(2) { left: 46px; top: 2px; width: 40px; height: 40px; }
    .flower .c:nth-child(3) { left: 30px; top: 20px; width: 44px; height: 44px; }
    .flower .c:nth-child(4) { left: 2px;  top: 16px; width: 38px; height: 38px; }
    .flower .c:nth-child(5) { left: -10px; top: -4px; width: 40px; height: 40px; }
    .flower .c:nth-child(6) { left: 16px; top: 0px; width: 52px; height: 52px; filter: brightness(1.13); }
    @keyframes drift {
      from { transform: translateX(-170px) scale(var(--fs,1)); }
      to   { transform: translateX(112vw) scale(var(--fs,1)); }
    }
    .flower.f1 { top: 6%;  --fc: #79e0c9; --fs: 1;   animation-duration: 70s; }
    .flower.f2 { top: 13%; --fc: #f3a6c8; --fs: .7;  animation-duration: 95s;  animation-delay: -30s; }
    .flower.f3 { top: 3%;  --fc: #b9a6f3; --fs: .85; animation-duration: 110s; animation-delay: -60s; }
    .flower.f4 { top: 17%; --fc: #a6e07b; --fs: .55; animation-duration: 80s;  animation-delay: -15s; }
    .flower.f5 { top: 9%;  --fc: #ffd36b; --fs: .65; animation-duration: 120s; animation-delay: -85s; }

    /* ════════ Mundo (cenário escalável) ════════ */
    #world {
      position: fixed; left: 50%; bottom: 0;
      width: 1280px; height: 660px;
      transform: translateX(-50%) scale(var(--s, 1));
      transform-origin: bottom center;
      z-index: 3;
    }
    .plx { position: absolute; inset: 0; will-change: transform; }

    /* ── Areia ── */
    .sand {
      position: absolute; left: -22%; right: -22%; bottom: 0; height: 124px;
      background:
        radial-gradient(140% 110% at 18% 0%, #f2d494 0 38%, transparent 39%),
        radial-gradient(150% 130% at 75% 0%, #eccb85 0 42%, transparent 43%),
        linear-gradient(180deg, #ecc782, #d9a95e);
      border-radius: 50% 50% 0 0 / 30px 30px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,.15), inset 0 14px 22px rgba(255,250,220,.45);
    }
    .sand::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 12% 40%, rgba(140,100,40,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 32% 70%, rgba(140,100,40,.3) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 45%, rgba(140,100,40,.3) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 65%, rgba(140,100,40,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 38%, rgba(140,100,40,.3) 0 2px, transparent 3px);
      background-size: 220px 90px;
    }
    .deco { position: absolute; z-index: 1; }

    /* ── Corais distantes ── */
    .coral { position: absolute; bottom: 100px; opacity: .6; }
    .coral .stem { position: absolute; bottom: 0; border-radius: 12px 12px 0 0; }
    .coral.c1 { left: 1%; }
    .coral.c1 .stem:nth-child(1) { left: 0;  width: 15px; height: 86px;  background: linear-gradient(180deg,#e07aa8,#b9537f); transform: rotate(-8deg); }
    .coral.c1 .stem:nth-child(2) { left: 15px; width: 13px; height: 118px; background: linear-gradient(180deg,#e88ab4,#c25f8c); }
    .coral.c1 .stem:nth-child(3) { left: 30px; width: 13px; height: 70px;  background: linear-gradient(180deg,#d06a98,#a9436f); transform: rotate(9deg); }
    .coral.c2 { left: 54%; }
    .coral.c2 .stem:nth-child(1) { left: 0;  width: 13px; height: 76px; background: linear-gradient(180deg,#9486dd,#6a57b8); transform: rotate(-10deg); }
    .coral.c2 .stem:nth-child(2) { left: 14px; width: 15px; height: 102px; background: linear-gradient(180deg,#a294e8,#7b68c9); }
    .coral.c2 .stem:nth-child(3) { left: 31px; width: 12px; height: 62px; background: linear-gradient(180deg,#8a78d4,#5d4aa8); transform: rotate(11deg); }
    .coral.c3 { left: 96%; }
    .coral.c3 .stem:nth-child(1) { left: 0; width: 14px; height: 92px; background: linear-gradient(180deg,#ecA060,#c97a3e); transform: rotate(-7deg); }
    .coral.c3 .stem:nth-child(2) { left: 15px; width: 13px; height: 68px; background: linear-gradient(180deg,#e0905c,#b96a32); transform: rotate(8deg); }
    .coral.c3 .stem:nth-child(3) { left: 28px; width: 15px; height: 106px; background: linear-gradient(180deg,#f2aa6a,#d08a48); }

    /* ── Algas ── */
    .weed {
      position: absolute; bottom: 74px;
      background: linear-gradient(180deg, #3cb066, #1a6e3a);
      border-radius: 50% 50% 6px 6px;
      transform-origin: bottom center;
      animation: sway 3.4s ease-in-out infinite alternate;
      box-shadow: inset -3px 0 6px rgba(0,40,15,.35);
    }
    @keyframes sway { from { transform: rotate(-11deg); } to { transform: rotate(11deg); } }
    .weed.w1 { left: 3%;  width: 17px; height: 100px; }
    .weed.w2 { left: 17%; width: 11px; height: 62px; animation-delay: .6s; }
    .weed.w3 { left: 43%; width: 13px; height: 76px; animation-delay: 1.1s; }
    .weed.w4 { left: 58%; width: 10px; height: 54px; animation-delay: .3s; }
    .weed.w5 { left: 78%; width: 16px; height: 90px; animation-delay: .9s; }
    .weed.w6 { left: 97%; width: 12px; height: 66px; animation-delay: 1.4s; }

    /* ════════ Casas e personagens (SVG) ════════ */
    .house { position: absolute; cursor: pointer; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .house:hover { transform: translateY(-8px) scale(1.025); }
    .house::before, .char::before {
      content: ''; position: absolute; bottom: -8px; left: 6%; width: 88%; height: 16px;
      background: radial-gradient(ellipse at center, rgba(2,24,46,.38), transparent 68%);
      z-index: -1;
    }
    .house svg, .char svg { display: block; overflow: visible; }

    .pineapple { left: 52px;  bottom: 96px; }
    .moai      { left: 296px; bottom: 96px; }
    .rock      { left: 470px; bottom: 96px; }
    .krusty    { left: 856px; bottom: 96px; }
    .chum      { left: 1146px; bottom: 96px; }

    .char {
      position: absolute; bottom: 66px; cursor: pointer; z-index: 6; will-change: transform;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1);
      animation: enter .85s var(--ed, 0s) cubic-bezier(.34,1.56,.64,1) backwards;
    }
    @keyframes enter {
      0% { transform: translateY(60px) scale(.2); opacity: 0; }
      70% { opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    .char:hover { transform: translateY(-12px) scale(1.04, .98); }

    .bob   { left: 150px; --ed: .05s; animation-name: enter, idle; animation-duration: .85s, 2.6s; animation-timing-function: cubic-bezier(.34,1.56,.64,1), ease-in-out; animation-delay: var(--ed), 1s; animation-iteration-count: 1, infinite; animation-direction: normal, alternate; animation-fill-mode: backwards, none; }
    @keyframes idle { from { margin-bottom: 0; } to { margin-bottom: 10px; } }
    .bob:hover { transform: translateY(-14px) rotate(-4deg); }
    .bob.flip { animation: bobflip .9s ease !important; }
    @keyframes bobflip {
      0% { transform: translateY(0) rotate(0); }
      45% { transform: translateY(-80px) rotate(190deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .gary  { left: 318px; bottom: 70px; --ed: .55s; }
    .gary:hover { transform: translateY(-6px) rotate(-4deg); }
    .squid { left: 434px; --ed: .25s; }
    .squid:hover { transform: translateY(-8px) rotate(2deg); }
    .pat   { left: 575px; --ed: .15s; }
    .pat:hover { transform: translateY(-10px) rotate(-6deg) scale(1.03, .98); }
    .sandy { left: 752px; --ed: .35s; }
    .sandy:hover { transform: translateY(-12px) rotate(3deg); }
    .krabs { left: 902px; --ed: .45s; }
    .krabs:hover { transform: translateY(-10px) scale(1.03, .98); }
    .plank { left: 1118px; bottom: 70px; --ed: .65s; }
    .plank:hover { transform: translateY(-10px) scale(2.5); z-index: 12; }

    /* pupilas (movidas pelo JS) e pálpebras */
    .pupil { will-change: transform; }
    .lid { transform-box: fill-box; transform-origin: center top; transform: scaleY(.04); animation: blink 5.2s infinite; }
    @keyframes blink { 0%, 91%, 100% { transform: scaleY(.04); } 94%, 96% { transform: scaleY(1); } }

    /* detalhes com hover */
    .krabs .cash { opacity: 0; transition: opacity .15s; }
    .krabs:hover .cash { opacity: 1; }
    .krabs:hover .pupil { opacity: 0; }
    .krabs .claw { transform-box: fill-box; transform-origin: center; transition: transform .25s; }
    .krabs:hover .claw.cl { transform: rotate(-22deg) translate(-3px, -6px); }
    .krabs:hover .claw.cr { transform: rotate(22deg) translate(3px, -6px); }
    .sandy .arm-r { transform-box: fill-box; transform-origin: top center; transition: transform .25s; }
    .sandy:hover .arm-r { transform: rotate(-115deg); }
    .squid .nose { transform-box: fill-box; transform-origin: top center; transition: transform .3s; }
    .squid:hover .nose { transform: rotate(7deg); }
    .pat .tongue { transform-box: fill-box; transform-origin: top center; transition: transform .25s; }
    .pat:hover .tongue { transform: scaleY(1.35); }

    /* ════════ Modo festa ════════ */
    #world.party .char { animation: dance .42s ease-in-out infinite alternate !important; }
    @keyframes dance {
      from { transform: translateY(0) rotate(-7deg) scale(1, .96); }
      to   { transform: translateY(-18px) rotate(7deg) scale(.97, 1.05); }
    }

    /* ════════ Águas-vivas ════════ */
    .jelly { position: fixed; width: 56px; height: 62px; z-index: 8; cursor: pointer; will-change: transform; filter: drop-shadow(0 0 12px rgba(255,150,220,.55)); }
    .jelly svg { display: block; overflow: visible; }
    .jelly .jt { transform-box: fill-box; transform-origin: top center; animation: tent .9s ease-in-out infinite alternate; }
    .jelly .jt.d2 { animation-delay: .2s; } .jelly .jt.d3 { animation-delay: .4s; } .jelly .jt.d4 { animation-delay: .1s; }
    @keyframes tent { from { transform: skewX(-13deg); } to { transform: skewX(13deg); } }
    .jelly.zap path.dome { fill: url(#jellyZap); }
    .jelly.caught { transition: transform .45s ease, opacity .45s ease; transform: scale(2.2) !important; opacity: 0 !important; }

    /* ════════ Bolhas ════════ */
    .bub {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 9;
      background: radial-gradient(circle at 32% 30%, rgba(255,255,255,.9), rgba(255,255,255,.05) 65%);
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: inset -2px -2px 4px rgba(120,200,255,.3);
      animation: bubup var(--d, 3s) ease-out forwards;
    }
    @keyframes bubup {
      0% { transform: translate(0,0) scale(.5); opacity: .95; }
      100% { transform: translate(var(--dx, 0px), var(--dy, -240px)) scale(1.15); opacity: 0; }
    }

    /* ════════ HUD ════════ */
    #title { position: fixed; top: 16px; left: 0; right: 0; text-align: center; z-index: 20; pointer-events: none; }
    #title h1 { font-family: 'Luckiest Guy', 'Comic Sans MS', cursive; font-size: clamp(34px, 6vw, 66px); letter-spacing: 2px; }
    #title h1 span {
      display: inline-block; color: #ffe93b;
      text-shadow: 3px 3px 0 #d4700a, -2px -2px 0 #07395f, 0 0 26px rgba(255,220,60,.5);
      animation: wave 2.4s ease-in-out infinite; pointer-events: auto;
    }
    #title h1 span:hover { animation: spinletter .55s ease; color: #ff8a65; }
    @keyframes wave { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
    @keyframes spinletter { from { transform: rotate(0) scale(1.4); } to { transform: rotate(360deg) scale(1); } }
    #title p { color: #d6f3ff; font-size: clamp(12px, 1.6vw, 16px); margin-top: 4px; text-shadow: 0 1px 4px rgba(0,0,0,.5); }

    #hud {
      position: fixed; top: 16px; right: 16px; z-index: 21;
      background: rgba(4, 32, 58, .55); backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,.25); border-radius: 16px;
      padding: 10px 16px; color: #fff; font-size: 15px; line-height: 1.7;
      box-shadow: 0 6px 18px rgba(0,0,0,.3);
    }
    #hud b { color: #ffe93b; font-size: 17px; }

    #hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      z-index: 21; background: rgba(4, 32, 58, .5); backdrop-filter: blur(6px);
      color: #cfeeff; font-size: 13px; padding: 7px 18px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,.2); white-space: nowrap;
      animation: hintpulse 3s ease-in-out infinite;
    }
    @keyframes hintpulse { 0%,100% { opacity: .85; } 50% { opacity: .5; } }
    #credit { position: fixed; bottom: 12px; left: 12px; z-index: 21; color: rgba(255,255,255,.5); font-size: 11px; }

    /* ════════ Balão de fala ════════ */
    #speech {
      position: fixed; z-index: 30; max-width: 260px;
      background: #fff; color: #15324c; border: 3px solid #07395f;
      border-radius: 18px; padding: 10px 16px; font-size: 15px; line-height: 1.4;
      box-shadow: 0 8px 20px rgba(0,0,0,.3);
      opacity: 0; transform: translateY(8px) scale(.92); pointer-events: none;
      transition: opacity .18s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    #speech.show { opacity: 1; transform: translateY(0) scale(1); }
    #speech::after {
      content: ''; position: absolute; bottom: -12px; left: 36px;
      width: 18px; height: 18px; background: #fff;
      border-right: 3px solid #07395f; border-bottom: 3px solid #07395f;
      transform: rotate(45deg); border-radius: 0 0 5px 0;
    }

    .floatpt {
      position: fixed; z-index: 31; font-family: 'Luckiest Guy', cursive;
      font-size: 24px; color: #ffe93b; text-shadow: 2px 2px 0 #d4700a;
      pointer-events: none; animation: floatup 1s ease-out forwards;
    }
    @keyframes floatup { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-70px); opacity: 0; } }

    /* ════════ Acabamento cinematográfico (melhorias) ════════ */

    /* profundidade de campo: a camada distante fica levemente desfocada */
    .plx[data-depth="10"] { filter: blur(1.4px) brightness(.93) saturate(.92); }

    /* superfície da água lá no alto */
    .surface {
      position: fixed; top: 0; left: 0; right: 0; height: 78px; z-index: 2;
      pointer-events: none; mix-blend-mode: screen; opacity: .5;
      background: linear-gradient(180deg, rgba(190,240,255,.55), transparent);
      animation: surf 6s ease-in-out infinite alternate;
    }
    @keyframes surf { from { opacity: .3; transform: translateY(-6px); } to { opacity: .6; transform: translateY(0); } }

    /* cáusticas: luz tremeluzente projetada na areia */
    .sand::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      pointer-events: none; mix-blend-mode: soft-light; opacity: .5;
      background:
        radial-gradient(58% 42% at 20% 16%, rgba(255,255,255,.85), transparent 60%),
        radial-gradient(50% 36% at 54% 28%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(54% 40% at 83% 18%, rgba(255,255,255,.8), transparent 60%);
      background-size: 360px 120px, 300px 120px, 340px 120px;
      animation: caustics 7s ease-in-out infinite alternate;
    }
    @keyframes caustics {
      from { background-position: 0 0, 40px 0, -30px 0; opacity: .3; }
      to   { background-position: 70px 0, -30px 0, 60px 0; opacity: .58; }
    }

    /* grade de cor + vinheta (acabamento de cinema) */
    .grade {
      position: fixed; inset: 0; pointer-events: none; z-index: 15; opacity: .85;
      mix-blend-mode: multiply;
      background:
        radial-gradient(120% 92% at 50% 38%, transparent 56%, rgba(2,16,36,.5) 100%),
        linear-gradient(180deg, rgba(60,140,180,.10), rgba(2,22,52,.16));
    }

    /* cardumes distantes (puro CSS) */
    .school { position: fixed; z-index: 2; pointer-events: none; will-change: transform;
              opacity: .5; filter: blur(.6px); animation: swim linear infinite; }
    .school.s1 { top: 30%; animation-duration: 42s; }
    .school.s2 { top: 53%; animation-name: swimR; animation-duration: 56s; animation-delay: -22s; opacity: .42; }
    .school.s3 { top: 40%; animation-duration: 66s; animation-delay: -40s; opacity: .3; filter: blur(1.5px); }
    @keyframes swim  { from { transform: translateX(-200px); }           to { transform: translateX(110vw); } }
    @keyframes swimR { from { transform: translateX(110vw) scaleX(-1); } to { transform: translateX(-200px) scaleX(-1); } }
    .fishlet { position: absolute; width: 24px; height: 12px; }
    .fishlet b {
      position: absolute; inset: 0; background: var(--fl, #2b6c8f);
      border-radius: 60% 55% 55% 60% / 50%;
      box-shadow: inset -3px -1px 4px rgba(0,0,0,.25);
      animation: wiggle 1.1s ease-in-out infinite alternate;
    }
    .fishlet b::after {
      content: ''; position: absolute; left: -8px; top: 0;
      border-top: 6px solid transparent; border-bottom: 6px solid transparent;
      border-right: 9px solid var(--fl, #2b6c8f);
    }
    @keyframes wiggle { from { transform: rotate(-4deg); } to { transform: rotate(4deg); } }

    /* barco distante derivando na superfície */
    .boat {
      position: fixed; top: 2.5%; left: 0; z-index: 2; color: #04263f;
      opacity: .26; filter: blur(.8px); animation: boatdrift 130s linear infinite;
    }
    @keyframes boatdrift { from { transform: translateX(-14vw); } to { transform: translateX(114vw); } }

    /* respiração sutil dos personagens (não interfere no hover/festa) */
    .char svg { animation: breathe 3.4s ease-in-out infinite alternate; }
    .gary  svg { animation-duration: 4.1s; }
    .squid svg { animation-duration: 3.8s; }
    .pat   svg { animation-duration: 4.5s; }
    .sandy svg { animation-duration: 3.2s; }
    .krabs svg { animation-duration: 3.6s; }
    .plank svg { animation-duration: 2.4s; }
    @keyframes breathe { from { transform: translateY(0) scaleY(1); } to { transform: translateY(-2.5px) scaleY(1.015); } }

    /* peixe-palhaço que segue o cursor */
    .follower { position: fixed; left: 0; top: 0; z-index: 9; pointer-events: none;
                will-change: transform; filter: drop-shadow(0 3px 5px rgba(2,30,60,.35)); }
    .follower .tailf { transform-box: fill-box; transform-origin: 9px 12px;
                       animation: ftail .34s ease-in-out infinite alternate; }
    @keyframes ftail { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }

    /* botão de som ambiente */
    #sound {
      position: fixed; bottom: 10px; right: 14px; z-index: 22;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      background: rgba(4,32,58,.55); border: 1px solid rgba(255,255,255,.25);
      color: #cfeeff; font-size: 15px; line-height: 1; backdrop-filter: blur(6px);
      transition: background .15s, transform .15s;
    }
    #sound:hover { background: rgba(4,32,58,.85); transform: scale(1.08); }

    /* respeita quem prefere menos movimento (só nas camadas decorativas novas) */
    @media (prefers-reduced-motion: reduce) {
      .surface, .sand::before, .school, .boat, .char svg, .follower .tailf { animation: none !important; }
    }
  </style>

      var titleStr = 'Fenda do Biquíni';

      /* ── Escala responsiva do mundo ── */

        var s = Math.min(1, W.innerWidth / 1320, W.innerHeight / 800);
        world.style.setProperty('--s', Math.max(0.42, s).toFixed(3));
      }
      setScale();
      W.addEventListener('resize', setScale);

      /* ── Som (WebAudio, sintetizado — sem arquivos) ── */

      function audio() {
        if (!actx) { try { actx = new (W.AudioContext || W.webkitAudioContext)(); } catch (e) {} }

        var a = audio(); if (!a) return;
        try {
          var o = a.createOscillator(), g = a.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, a.currentTime);
          o.frequency.exponentialRampToValueAtTime(freq * 0.4, a.currentTime + dur);
          g.gain.setValueAtTime(0.12, a.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
          o.connect(g); g.connect(a.destination);
          o.start(); o.stop(a.currentTime + dur);
        } catch (e) {}
      }

      /* ── Bolhas ── */
      var MAXBUB = 46, bubCount = 0;
      function bubble(x, y, size, dx, dy, dur) {
        if (bubCount >= MAXBUB) return;
        bubCount++;
        var b = D.createElement('div');
        b.className = 'bub';
        b.style.left = (x - size / 2) + 'px';
        b.style.top = (y - size / 2) + 'px';
        b.style.width = b.style.height = size + 'px';
        b.style.setProperty('--dx', dx + 'px');
        b.style.setProperty('--dy', dy + 'px');
        b.style.setProperty('--d', dur + 's');
        D.body.appendChild(b);
        setTimeout(function () { b.remove(); bubCount--; }, dur * 1000);
      }
      function burst(x, y, n) {
        for (var i = 0; i < n; i++) {
          bubble(x, y, 6 + Math.random() * 16,
            (Math.random() - 0.5) * 160, -90 - Math.random() * 200,
            1.2 + Math.random() * 1.4);
        }
        bubPopped += n;
        D.getElementById('cbub').textContent = bubPopped;
      }

      /* ── Rastro de bolhas do mouse ── */
      var lastX = mx, lastY = my;
      function trail(x, y) {
        var dx = x - lastX, dy = y - lastY;
        if (dx * dx + dy * dy > 1400) {
          lastX = x; lastY = y;
          bubble(x + (Math.random() - 0.5) * 14, y + (Math.random() - 0.5) * 14,
            4 + Math.random() * 9, (Math.random() - 0.5) * 50,
            -60 - Math.random() * 120, 1.6 + Math.random());
        }
      }

      function setMouse(x, y) {
        mx = x; my = y;
        nmx = (x / W.innerWidth) * 2 - 1;
        nmy = (y / W.innerHeight) * 2 - 1;
        trail(x, y);
      }
      D.addEventListener('mousemove', function (e) { setMouse(e.clientX, e.clientY); });
      D.addEventListener('touchmove', function (e) {
        if (e.touches.length) setMouse(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      D.addEventListener('pointerdown', function (e) {
        audio();
        if (e.target.closest('.jelly')) return;
        burst(e.clientX, e.clientY, 7);
        pop(520 + Math.random() * 240, 0.14);
      });

      /* ── Balão de fala ── */
      var speech = D.getElementById('speech'), hideTimer = null;
      function say(el, txt) {
        clearTimeout(hideTimer);
        var r = el.getBoundingClientRect();
        speech.textContent = txt;
        speech.classList.add('show');
        var x = Math.max(8, Math.min(W.innerWidth - 278, r.left + r.width / 2 - 60));
        speech.style.left = x + 'px';
        speech.style.top = Math.max(8, r.top - 70) + 'px';
        requestAnimationFrame(function () {
          speech.style.top = Math.max(8, r.top - speech.offsetHeight - 26) + 'px';
        });
      }
      function hideSpeech(delay) {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function () { speech.classList.remove('show'); }, delay || 140);
      }
      var talkers = D.querySelectorAll('[data-say]');
      for (var t = 0; t < talkers.length; t++) {
        (function (el) {
          var lines = el.getAttribute('data-say').split('|');
          function talk() { say(el, lines[Math.floor(Math.random() * lines.length)]); }
          el.addEventListener('mouseenter', function () { talk(); pop(700, 0.07); });
          el.addEventListener('mouseleave', function () { hideSpeech(160); });
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            talk(); hideSpeech(2200);
            burst(e.clientX || 0, e.clientY || 0, 5);
            pop(620, 0.12);
          });
        })(talkers[t]);
      }

      /* ── Bob: clique = cambalhota + FESTA ── */
      var bob = D.getElementById('bob');
      bob.addEventListener('click', function () {
        bob.classList.remove('flip');
        void bob.offsetWidth;
        bob.classList.add('flip');
        world.classList.add('party');
        say(bob, 'FESTA NA FENDA! 🎉🧽');
        hideSpeech(2600);
        pop(880, 0.18); pop(660, 0.22);
        var r = bob.getBoundingClientRect();
        burst(r.left + r.width / 2, r.top + 20, 14);
        setTimeout(function () {
          world.classList.remove('party');
          bob.classList.remove('flip');
        }, 3600);
      });

      /* ── Olhos que seguem o mouse ── */
      var pupils = [];
      var pupilEls = D.querySelectorAll('.pupil');
      for (var p = 0; p < pupilEls.length; p++) pupils.push(pupilEls[p]);
      function movePupils() {
        for (var i = 0; i < pupils.length; i++) {
          var el = pupils[i];
          var pr = el.parentElement.getBoundingClientRect();
          var cx = pr.left + pr.width / 2, cy = pr.top + pr.height / 2;
          var ang = Math.atan2(my - cy, mx - cx);
          var dist = Math.min(pr.width / 4.5 + 1.5, Math.hypot(mx - cx, my - cy) / 14);
          el.style.transform = 'translate(' + (Math.cos(ang) * dist).toFixed(1) + 'px,' + (Math.sin(ang) * dist).toFixed(1) + 'px)';
        }
      }

      /* ── Parallax das camadas ── */
      var layers = D.querySelectorAll('.plx');
      function parallax() {
        for (var i = 0; i < layers.length; i++) {
          var d = +layers[i].getAttribute('data-depth');
          layers[i].style.transform = 'translate(' + (-nmx * d).toFixed(1) + 'px,' + (-nmy * d * 0.4).toFixed(1) + 'px)';
        }
      }

      /* ── Águas-vivas ── */
      var jellies = [];
      function spawnJelly(first) {
        var el = D.createElement('div');
        el.className = 'jelly';
        el.innerHTML =
          '<svg width="56" height="62" viewBox="0 0 56 62">' +
          '<defs><radialGradient id="jg' + jellies.length + Math.floor(Math.random() * 9999) + '" cx="38%" cy="30%" r="80%">' +
          '<stop offset="0%" stop-color="#ffd6ef"/><stop offset="100%" stop-color="#ff6ec7"/></radialGradient></defs>' +
          '<path class="jt d1" d="M12 36 Q10 50 13 58" stroke="#ff8ad2" stroke-width="4.5" fill="none" stroke-linecap="round"/>' +
          '<path class="jt d2" d="M23 38 Q22 52 25 60" stroke="#ff8ad2" stroke-width="4.5" fill="none" stroke-linecap="round"/>' +
          '<path class="jt d3" d="M34 38 Q35 52 32 60" stroke="#ff8ad2" stroke-width="4.5" fill="none" stroke-linecap="round"/>' +
          '<path class="jt d4" d="M45 36 Q47 50 44 58" stroke="#ff8ad2" stroke-width="4.5" fill="none" stroke-linecap="round"/>' +
          '<path class="dome" d="M4 32 Q2 6 28 5 Q54 6 52 32 Q44 39 28 38 Q12 39 4 32 Z" fill="#ff9ed9" stroke="#e055a8" stroke-width="2"/>' +
          '<circle cx="17" cy="18" r="3" fill="rgba(170,40,120,.5)"/><circle cx="30" cy="14" r="3" fill="rgba(170,40,120,.5)"/><circle cx="41" cy="20" r="3" fill="rgba(170,40,120,.5)"/>' +
          '<path d="M10 14 a16 12 0 0 1 9 -7" stroke="rgba(255,255,255,.8)" stroke-width="3" fill="none" stroke-linecap="round"/>' +
          '</svg>';
        D.body.appendChild(el);
        var j = {
          el: el,
          x: first ? Math.random() * W.innerWidth : (Math.random() < 0.5 ? -70 : W.innerWidth + 70),
          y: 80 + Math.random() * (W.innerHeight * 0.55),
          vx: 0, vy: 0,
          phase: Math.random() * Math.PI * 2,
          speed: 0.35 + Math.random() * 0.45,
          dir: Math.random() < 0.5 ? 1 : -1,
          alive: true
        };
        el.addEventListener('pointerdown', function (e) {
          e.stopPropagation();
          if (!j.alive) return;
          j.alive = false;
          el.classList.add('zap');
          el.classList.add('caught');
          jellyCaught++;
          D.getElementById('cjelly').textContent = jellyCaught;
          pop(980, 0.1); pop(1320, 0.16);
          burst(j.x + 28, j.y + 20, 6);
          var f = D.createElement('div');
          f.className = 'floatpt'; f.textContent = '+1 🪼';
          f.style.left = j.x + 'px'; f.style.top = (j.y - 10) + 'px';
          D.body.appendChild(f);
          setTimeout(function () { f.remove(); }, 1000);
          setTimeout(function () {
            el.remove();
            jellies.splice(jellies.indexOf(j), 1);
            spawnJelly(false);
          }, 480);
        });
        jellies.push(j);
      }
      for (var jn = 0; jn < 6; jn++) spawnJelly(true);

      function moveJellies(dt) {
        for (var i = 0; i < jellies.length; i++) {
          var j = jellies[i];
          if (!j.alive) continue;
          j.phase += dt * 0.002;
          j.vx += j.dir * 0.012;
          j.vy += Math.cos(j.phase) * 0.05;
          // foge do mouse (tímida, mas charmosa)
          var dx = (j.x + 28) - mx, dy = (j.y + 20) - my;
          var d2 = dx * dx + dy * dy;
          if (d2 < 16900) {
            var d = Math.sqrt(d2) || 1;
            j.vx += (dx / d) * 0.5;
            j.vy += (dy / d) * 0.5;
          }
          j.vx *= 0.965; j.vy *= 0.96;
          j.x += j.vx * j.speed * dt * 0.09;
          j.y += (j.vy + Math.sin(j.phase) * 0.5) * j.speed * dt * 0.075;
          if (j.x < -90) { j.x = -90; j.dir = 1; }
          if (j.x > W.innerWidth + 90) { j.x = W.innerWidth + 90; j.dir = -1; }
          if (j.y < 60) { j.y = 60; j.vy = Math.abs(j.vy); }
          var maxY = W.innerHeight * 0.72;
          if (j.y > maxY) { j.y = maxY; j.vy = -Math.abs(j.vy); }
          j.el.style.transform = 'translate(' + j.x.toFixed(1) + 'px,' + j.y.toFixed(1) + 'px) rotate(' + (j.vx * 3).toFixed(1) + 'deg)';
        }
      }

      /* ── Loop principal ── */
      var last = performance.now();
      function loop(now) {
        var dt = Math.min(48, now - last);
        last = now;
        movePupils();
        parallax();
        moveJellies(dt);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      /* ── Bolhas ambientes sobem sozinhas ── */
      setInterval(function () {
        bubble(Math.random() * W.innerWidth, W.innerHeight + 30,
          5 + Math.random() * 12, (Math.random() - 0.5) * 60,
          -W.innerHeight * (0.5 + Math.random() * 0.5), 4 + Math.random() * 3);
      }, 900);
    })();
  </script>

  <script>
    /* ── Peixe-palhaço que persegue o cursor + trilha sonora ambiente ── */
    (function () {
      'use strict';
      var W = window, D = document;
      var reduce = W.matchMedia && W.matchMedia('(prefers-reduced-motion: reduce)').matches;

      /* peixe que segue (e respeita) o cursor */
      var f = D.getElementById('follower');
      var tx = W.innerWidth * 0.5, ty = W.innerHeight * 0.55;
      var x = tx, y = ty, dir = 1;
      function aim(cx, cy) { tx = cx; ty = cy; }
      D.addEventListener('mousemove', function (e) { aim(e.clientX, e.clientY); });
      D.addEventListener('touchmove', function (e) { if (e.touches.length) aim(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
      function swim() {
        var dx = tx - x, dy = ty - y, d = Math.hypot(dx, dy);
        var k = d > 52 ? 0.075 : 0;            // para ~52px do cursor (não o cobre)
        x += dx * k; y += dy * k;
        if (dx > 2) dir = 1; else if (dx < -2) dir = -1;
        f.style.transform = 'translate(' + (x - 21).toFixed(1) + 'px,' + (y - 12).toFixed(1) + 'px) scaleX(' + dir + ')';
        requestAnimationFrame(swim);
      }
      if (f && !reduce) requestAnimationFrame(swim);
      else if (f) f.style.display = 'none';

      /* trilha sonora ambiente sintetizada (opcional, só após clique no botão) */
      var btn = D.getElementById('sound'), actx = null, on = false, master = null;
      function build() {
        actx = new (W.AudioContext || W.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        var base = actx.createGain(); base.gain.value = 0.5; base.connect(master);
        var o1 = actx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 58; o1.connect(base);
        var g2 = actx.createGain(); g2.gain.value = 0.35;
        var o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 87; o2.connect(g2); g2.connect(base);
        var lfo = actx.createOscillator(); lfo.frequency.value = 0.12;            // ondula como água
        var lg = actx.createGain(); lg.gain.value = 0.5; lfo.connect(lg); lg.connect(base.gain);
        o1.start(); o2.start(); lfo.start();
      }
      function toggle() {
        if (!actx) build();
        if (actx.state === 'suspended') actx.resume();
        on = !on;
        master.gain.setTargetAtTime(on ? 0.06 : 0, actx.currentTime, 0.4);
        btn.textContent = on ? '🔊' : '🔈';
      }
      if (btn) btn.addEventListener('click', toggle);
    })();
  </script>
</body>
</html>
